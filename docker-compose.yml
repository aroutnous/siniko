name: kalanko

services:

  # =====================
  # BASE DE DONNÉES
  # =====================
  db:
    image: postgres:16-alpine
    container_name: kalanko_db
    environment:
      POSTGRES_DB: kalanko
      POSTGRES_USER: kalanko_user
      POSTGRES_PASSWORD: kalanko_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalanko_user -d kalanko"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # CACHE / SESSIONS
  # =====================
  redis:
    image: redis:7-alpine
    container_name: kalanko_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # BACKEND (à activer en Phase 1)
  # =====================
  backend:
    build: ./backend
    container_name: kalanko_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kalanko_user:kalanko_dev_password@db:5432/kalanko
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173,http://127.0.0.1,http://127.0.0.1:80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =====================
  # FRONTEND (à activer en Phase 1)
  # =====================
  frontend:
    build: ./frontend
    container_name: kalanko_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # =====================
  # DB UI (développement uniquement)
  # =====================
  adminer:
    image: adminer:latest
    container_name: kalanko_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
