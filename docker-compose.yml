name: kalanko

services:

  # =====================
  # BASE DE DONNÉES
  # =====================
  db:
    image: postgres:16-alpine
    container_name: kalanko_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalanko_user -d kalanko"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # CACHE / SESSIONS
  # =====================
  redis:
    image: redis:7-alpine
    container_name: kalanko_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # BACKEND (à activer en Phase 1)
  # =====================
  backend:
    build: ./backend
    container_name: kalanko_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =====================
  # FRONTEND (à activer en Phase 1)
  # =====================
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.kalanko.tech
    container_name: kalanko_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # =====================
  # DB UI (développement uniquement)
  # =====================
  adminer:
    image: adminer:latest
    container_name: kalanko_adminer
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db

  # =====================
  # MONITORING (Phase 2 DevSecOps)
  # =====================
  prometheus:
    image: prom/prometheus:latest
    container_name: kalanko_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: kalanko_grafana
    env_file:
      - .env.prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_HTTP_PORT: 3001
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: kalanko_loki
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: kalanko_promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
