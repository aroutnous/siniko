# Stack SINIKO — Mac M4 (linux/arm64) — mode 100 % Docker
# postgres + pgAdmin + migrations + API + frontend + Loki/Grafana

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siniko
      POSTGRES_PASSWORD: siniko
      POSTGRES_DB: siniko
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siniko -d siniko"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://siniko:siniko@postgres:5432/siniko
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4:8.14
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@siniko.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://siniko:siniko@postgres:5432/siniko
      APP_DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    logging:
      driver: json-file
      options:
        max-size: "10m"
        labels: "service=siniko-api"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  postgres_data:
  pgadmin_data:
  loki_data:
  grafana_data:
  promtail_positions:
