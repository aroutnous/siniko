name: CI DevSecOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-quality:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_SECRET_KEY: ci-secret-key-min-32-characters-long-xx
      JWT_SECRET_KEY: ci-jwt-secret-key-min-32-characters-long
      DATABASE_URL: postgresql+asyncpg://siniko:siniko@localhost:5432/siniko_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: bandit -r app -ll -c pyproject.toml
      - run: pip-audit -r requirements.txt
      - run: pytest

  frontend-quality:
    name: Frontend — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - run: npm run lint
      - run: npm run test:coverage

  semgrep:
    name: SAST (Semgrep OWASP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/python
            p/typescript

  # Activer dans Settings → Secrets : SNYK_TOKEN
  # Puis Variables → ENABLE_SNYK = true
  snyk:
    name: SCA (Snyk)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SNYK == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/requirements.txt
      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

  # Activer : SONAR_TOKEN (secret) + variable ENABLE_SONAR = true
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SONAR == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-security:
    name: Docker — Hadolint & Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
      - name: Build API image
        run: docker build -t siniko-api:ci ./backend
      - name: Trivy scan API
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.63.0 image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            siniko-api:ci

  ci-success:
    name: CI — gate
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - backend-quality
      - frontend-quality
      - semgrep
      - docker-security
    if: always()
    steps:
      - name: Vérifier les jobs requis
        run: |
          test "${{ needs.gitleaks.result }}" = "success"
          test "${{ needs.backend-quality.result }}" = "success"
          test "${{ needs.frontend-quality.result }}" = "success"
          test "${{ needs.semgrep.result }}" = "success"
          test "${{ needs.docker-security.result }}" = "success"
